<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <meta name="description" content="Portfolio" />
  <meta name="keywords" content="portfolio" />
  <meta name="author" content="" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0a0e1a" />
  <!-- Update href with your actual portfolio URL when deployed -->
  <link rel="canonical" href="https://niteshmourya.github.io/" />
  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="./assets/favicon-96x96.png" />
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
  <link rel="manifest" href="./assets/site.webmanifest" />
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="" />
  <meta property="og:title" content="Portfolio" />
  <meta property="og:description" content="Portfolio" />
  <meta property="og:image" content="" />
  <meta property="og:site_name" content="" />
  <meta property="og:locale" content="en_IN" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Portfolio" />
  <meta name="twitter:description" content="Portfolio" />
  <meta name="twitter:image" content="" />
  <!-- JSON-LD Structured Data -->
  <script id="person-jsonld" type="application/ld+json">{}</script>
  <link rel="preload" href="./assets/Photo.jpg" as="image" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: {
              DEFAULT: '#0a0e1a',
              lighter: '#0f1729',
              card: '#141b2d',
              border: 'rgba(34, 211, 238, 0.15)',
            },
            cyan: {
              DEFAULT: '#22d3ee',
              dark: '#06b6d4',
              light: '#67e8f9',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }


    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(50px, 50px);
      }
    }

    /* Gradient orbs */
    .gradient-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      top: 10%;
      left: 20%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #22d3ee 0%, transparent 70%);
      animation: float 15s ease-in-out infinite;
    }

    .orb-2 {
      bottom: 20%;
      right: 10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
      animation: float 20s ease-in-out infinite reverse;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(30px, -30px) scale(1.1);
      }
    }

    #root {
      position: relative;
      z-index: 1;
    }

    /* Navigation */
    nav {
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(34, 211, 238, 0.1);
      transition: all 0.3s ease;
    }

    nav.scrolled {
      background: rgba(10, 14, 26, 0.95);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }

    /* Cards */
    .card {
      background: linear-gradient(145deg, rgba(20, 27, 45, 0.6), rgba(15, 23, 41, 0.4));
      border: 1px solid rgba(34, 211, 238, 0.15);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #22d3ee, transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(34, 211, 238, 0.4);
      box-shadow: 0 20px 60px rgba(34, 211, 238, 0.15);
    }

    .card:hover::before {
      transform: translateX(100%);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
      color: #0a0e1a;
      font-weight: 600;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(34, 211, 238, 0.5);
    }

    .btn-secondary {
      background: rgba(34, 211, 238, 0.1);
      color: #22d3ee;
      font-weight: 600;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      border: 1px solid rgba(34, 211, 238, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(34, 211, 238, 0.2);
      border-color: #22d3ee;
    }

    /* Stats */
    .stat-card {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.1) 0%, rgba(6, 182, 212, 0.05) 100%);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .stat-card:hover::before {
      left: 100%;
    }

    .stat-card:hover {
      transform: scale(1.05);
      border-color: rgba(34, 211, 238, 0.4);
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: #22d3ee;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 3rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0.75rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #22d3ee, #06b6d4);
      opacity: 0.3;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 2.5rem;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2.6rem;
      top: 0rem;
      width: 14px;
      height: 14px;
      background: #22d3ee;
      border: 3px solid #0a0e1a;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.3);
      transition: all 0.3s ease;
    }

    .timeline-item:hover::before {
      transform: scale(1.3);
      box-shadow: 0 0 0 6px rgba(34, 211, 238, 0.3);
    }

    /* Tags */
    .tag {
      display: inline-block;
      background: rgba(34, 211, 238, 0.1);
      color: #22d3ee;
      padding: 0.375rem 0.875rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid rgba(34, 211, 238, 0.2);
      margin: 0.25rem;
      transition: all 0.2s ease;
    }

    .tag:hover {
      background: rgba(34, 211, 238, 0.2);
      border-color: #22d3ee;
    }

    /* Hero Section */
    .hero-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 6rem 1.5rem;
    }

    .hero-title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1.25rem, 3vw, 2rem);
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    /* Section Headers */
    .section-header {
      position: relative;
      display: inline-block;
      margin-bottom: 3rem;
    }

    .section-header::after {
      content: '';
      position: absolute;
      bottom: -0.5rem;
      left: 0;
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, #22d3ee, transparent);
    }

    /* Scroll Animations */
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s ease forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in:nth-child(1) {
      animation-delay: 0.1s;
    }

    .fade-in:nth-child(2) {
      animation-delay: 0.2s;
    }

    .fade-in:nth-child(3) {
      animation-delay: 0.3s;
    }

    .fade-in:nth-child(4) {
      animation-delay: 0.4s;
    }

    /* Mobile Menu */
    .mobile-menu {
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    .mobile-menu.active {
      transform: translateX(0);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #0f1729;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(34, 211, 238, 0.3);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(34, 211, 238, 0.5);
    }

    /* Form Inputs */
    input,
    textarea {
      background: rgba(20, 27, 45, 0.6);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 12px;
      padding: 0.7rem !important;
      color: #e2e8f0;
      transition: all 0.3s ease;
      width: 100%;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #22d3ee;
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
    }

    input::placeholder,
    textarea::placeholder {
      color: #64748b;
    }

    /* Loading Animation */
    .loading-spinner {
      border: 3px solid rgba(34, 211, 238, 0.1);
      border-top-color: #22d3ee;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Social Links */
    .social-link {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 12px;
      color: #22d3ee;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      background: rgba(34, 211, 238, 0.2);
      border-color: #22d3ee;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(34, 211, 238, 0.2);
    }

    /* WhatsApp floating action button */
    .whatsapp-fab {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(37, 211, 102, 0.15);
      border: 1px solid rgba(37, 211, 102, 0.35);
      color: #25D366;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      transition: all 0.2s ease;
      z-index: 60;
      backdrop-filter: blur(14px);
    }

    .whatsapp-fab:hover {
      transform: translateY(-3px);
      background: rgba(37, 211, 102, 0.22);
      border-color: rgba(37, 211, 102, 0.6);
      box-shadow: 0 18px 45px rgba(37, 211, 102, 0.18);
    }

    /* Profile Image */
    .profile-image {
      width: 340px;
      height: 380px;
      border-radius: 24px;
      border: 3px solid rgba(34, 211, 238, 0.4);
      box-shadow: 0 0 0 8px rgba(34, 211, 238, 0.08), 0 24px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(34, 211, 238, 0.12);
      transition: all 0.3s ease;
    }

    .profile-image:hover {
      transform: scale(1.03);
      box-shadow: 0 0 0 12px rgba(34, 211, 238, 0.15), 0 30px 70px rgba(34, 211, 238, 0.25);
    }

    /* Responsive - Mobile First Enhancements */
    @media (min-width: 1024px) {
      .stat-card {
        padding: 2rem;
        border-radius: 16px;
      }
    }

    /* Scroll offset for fixed nav anchor links */
    section[id^="section-"] {
      scroll-margin-top: 5rem;
    }

    @media (min-width: 768px) {
      section[id^="section-"] {
        scroll-margin-top: 6rem;
      }
    }

    @media (min-width: 768px) {
      .card {
        padding: 2rem;
        border-radius: 16px;
      }
    }

    @media (max-width: 640px) {
      .hero-section {
        padding: 5rem 1rem 3rem;
        min-height: auto;
      }

      .hero-title {
        font-size: clamp(1.75rem, 6vw, 2.5rem);
        margin-bottom: 1rem;
      }

      .hero-subtitle {
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }

      .stat-value {
        font-size: 1.5rem;
      }

      .card {
        padding: 1.25rem;
      }

      .card:hover {
        transform: none;
      }

      .timeline {
        padding-left: 1.5rem;
      }

      .timeline::before {
        left: 0.375rem;
      }

      .timeline-item::before {
        left: -1.4rem;
        width: 10px;
        height: 10px;
        border-width: 2px;
      }

      .profile-image {
        width: 220px;
        height: 250px;
        border-radius: 18px;
      }

      .orb-1,
      .orb-2 {
        width: 200px;
        height: 200px;
        opacity: 0.1;
      }

      .section-header {
        margin-bottom: 1.5rem;
      }

      .section-header::after {
        width: 40%;
      }

      .social-link {
        width: 40px;
        height: 40px;
      }

      .social-link svg {
        width: 18px;
        height: 18px;
      }

      .tag {
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
      }

      .btn-primary,
      .btn-secondary {
        padding: 0.75rem 1.25rem;
        font-size: 0.875rem;
        min-height: 44px;
      }
    }

    @media (min-width: 641px) and (max-width: 768px) {
      .hero-section {
        padding: 5rem 1.5rem 4rem;
      }

      .stat-value {
        font-size: 1.75rem;
      }

      .card {
        padding: 1.5rem;
      }

      .profile-image {
        width: 260px;
        height: 300px;
        border-radius: 20px;
      }

      .orb-1,
      .orb-2 {
        width: 280px;
        height: 280px;
      }
    }

    @media (max-width: 768px) {
      .card:hover {
        transform: translateY(-2px);
      }

      .stat-card:hover {
        transform: scale(1.02);
      }
    }

    @media (min-width: 769px) {
      .card:hover {
        transform: translateY(-4px);
      }
    }

    /* Prevent hover effects on touch devices */
    @media (hover: none) {
      .card:hover {
        transform: none;
      }

      .stat-card:hover {
        transform: none;
      }

      .social-link:hover {
        transform: none;
      }

      .profile-image:hover {
        transform: none;
      }
    }

    /* Section spacing - consistent responsive padding */
    .section-padding {
      padding: 3rem 1rem;
    }

    @media (min-width: 640px) {
      .section-padding {
        padding: 4rem 1.5rem;
      }
    }

    @media (min-width: 1024px) {
      .section-padding {
        padding: 6rem 2rem;
      }
    }

    /* Prevent horizontal overflow */
    .overflow-x-hidden {
      overflow-x: hidden;
    }

    /* Touch-friendly tap targets */
    @media (max-width: 768px) {

      nav button,
      .social-link,
      .btn-primary,
      .btn-secondary {
        min-height: 44px;
        min-width: 44px;
      }
    }
  </style>
</head>

<body>
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DEFAULT_CITATION_DATA = {
      googleScholar: { citations: 0, hIndex: 0, i10Index: 0 },
      researchGate: { reads: 0, citations: 0, recommendations: 0 },
    };

    function mergeCitationData(incoming) {
      const gs = (incoming && incoming.googleScholar) || {};
      const rg = (incoming && incoming.researchGate) || {};
      return {
        googleScholar: {
          citations: Number.isFinite(gs.citations) ? gs.citations : DEFAULT_CITATION_DATA.googleScholar.citations,
          hIndex: Number.isFinite(gs.hIndex) ? gs.hIndex : DEFAULT_CITATION_DATA.googleScholar.hIndex,
          i10Index: Number.isFinite(gs.i10Index) ? gs.i10Index : DEFAULT_CITATION_DATA.googleScholar.i10Index,
        },
        researchGate: {
          reads: Number.isFinite(rg.reads) ? rg.reads : DEFAULT_CITATION_DATA.researchGate.reads,
          citations: Number.isFinite(rg.citations) ? rg.citations : DEFAULT_CITATION_DATA.researchGate.citations,
          recommendations: Number.isFinite(rg.recommendations) ? rg.recommendations : DEFAULT_CITATION_DATA.researchGate.recommendations,
        },
      };
    }

    function getShortName(fullName) {
      if (!fullName) return "";
      const parts = String(fullName).trim().split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0];
      const last = parts[parts.length - 1];
      const firstInitial = parts[0][0] ? parts[0][0].toUpperCase() + "." : "";
      const secondInitial = parts.length > 2 && parts[1][0] ? parts[1][0].toUpperCase() + "." : "";
      const initials = `${firstInitial}${secondInitial}`.trim();
      return initials ? `${initials} ${last}` : last;
    }

    function setMetaBySelector(selector, content) {
      const el = document.querySelector(selector);
      if (!el) return;
      if (content === undefined || content === null || content === "") return;
      el.setAttribute("content", String(content));
    }

    function setLinkHref(selector, href) {
      const el = document.querySelector(selector);
      if (!el) return;
      if (href === undefined || href === null || href === "") return;
      el.setAttribute("href", String(href));
    }

    function applySiteMeta(data) {
      const profile = (data && data.profile) || {};
      const site = (data && data.site) || {};

      const title = site.title || [profile.name, profile.title].filter(Boolean).join(" | ") || "Portfolio";
      document.title = title;

      setMetaBySelector('meta[name="description"]', site.description);
      setMetaBySelector('meta[name="keywords"]', site.keywords);
      setMetaBySelector('meta[name="author"]', profile.name || site.author);

      setLinkHref('link[rel="canonical"]', site.canonical);

      setMetaBySelector('meta[property="og:url"]', site.canonical);
      setMetaBySelector('meta[property="og:title"]', title);
      setMetaBySelector('meta[property="og:description"]', site.description);
      setMetaBySelector('meta[property="og:image"]', site.ogImage);
      setMetaBySelector('meta[property="og:site_name"]', site.siteName);

      setMetaBySelector('meta[name="twitter:title"]', title);
      setMetaBySelector('meta[name="twitter:description"]', site.description);
      setMetaBySelector('meta[name="twitter:image"]', site.ogImage);

      const jsonld = {
        "@context": "https://schema.org",
        "@type": "Person",
        name: profile.name || undefined,
        jobTitle: profile.title || undefined,
        url: site.canonical || undefined,
        image: site.ogImage || profile.photo || undefined,
        email: profile.email || undefined,
        address: profile.location || undefined,
        sameAs: profile.links ? Object.values(profile.links).filter(Boolean) : undefined,
      };
      const jsonldEl = document.getElementById("person-jsonld");
      if (jsonldEl) jsonldEl.textContent = JSON.stringify(jsonld, null, 2);
    }

    function digitsOnly(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function getWhatsAppLink(phone, message) {
      const digits = digitsOnly(phone);
      if (!digits) return null;
      const base = `https://wa.me/${digits}`;
      const text = (message || "").trim();
      return text ? `${base}?text=${encodeURIComponent(text)}` : base;
    }

    function Portfolio() {
      const [activeSection, setActiveSection] = useState("home");
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const [formData, setFormData] = useState({
        name: "",
        email: "",
        subject: "",
        message: ""
      });
      const [formStatus, setFormStatus] = useState({
        submitting: false,
        success: false,
        error: false,
        message: ""
      });

      const [portfolioData, setPortfolioData] = useState(null);
      const [loadError, setLoadError] = useState(null);
      const [citationData, setCitationData] = useState(DEFAULT_CITATION_DATA);
      const [publications, setPublications] = useState([]);
      const [experience, setExperience] = useState([]);
      const [journalPositions, setJournalPositions] = useState([]);
      const [workshops, setWorkshops] = useState([]);
      const [skills, setSkills] = useState([]);
      const [education, setEducation] = useState([]);
      const [certifications, setCertifications] = useState([]);
      const [profile, setProfile] = useState(null);
      const [researchInterests, setResearchInterests] = useState([]);

      function applyData(d) {
        setLoadError(null);
        setPortfolioData(d);
        applySiteMeta(d);
        setCitationData(mergeCitationData(d.citationData));
        setPublications(d.publications || []);
        setExperience(d.experience || []);
        setJournalPositions(d.journalPositions || []);
        setWorkshops(d.workshops || []);
        setSkills(d.skills || []);
        setEducation(d.education || []);
        setCertifications(d.certifications || []);
        setProfile(d.profile || null);
        setResearchInterests(d.researchInterests || []);
      }

      useEffect(() => {
        fetch('./portfolio-data.json', { cache: 'no-store' })
          .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
          .then(applyData)
          .catch((err) => {
            console.error("Failed to load portfolio-data.json:", err);
            setLoadError(
              "Couldn't load portfolio-data.json. If you're opening index.html directly, most browsers block fetch() for local files. Please run this folder with a local web server (e.g., VS Code Live Server) so JSON can be loaded."
            );
          });
      }, []);

      // Scroll handler
      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 50);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Smooth scroll to section
      const scrollToSection = (sectionId) => {
        setActiveSection(sectionId);
        setMobileMenuOpen(false);

        if (sectionId === 'home') {
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }

        setTimeout(() => {
          const element = document.getElementById(`section-${sectionId}`);
          if (element) {
            const navHeight = 80;
            const elementPosition = element.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - navHeight;
            window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
          }
        }, 100);
      };

      // Form handlers
      const handleFormChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        setFormStatus({ submitting: true, success: false, error: false, message: "" });

        const targetEmail = profile.email;
        const formSubmitEndpoint = `https://formsubmit.co/ajax/${encodeURIComponent(targetEmail)}`;

        try {
          const response = await fetch(formSubmitEndpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({
              name: formData.name,
              email: formData.email,
              subject: formData.subject,
              message: formData.message,
              _captcha: false,
              _template: "table",
              _subject: formData.subject
            })
          });

          const data = await response.json();

          if (response.ok && data.success) {
            setFormStatus({
              submitting: false,
              success: true,
              error: false,
              message: `Thank you! Your message has been sent successfully to ${targetEmail}`
            });
            setFormData({ name: "", email: "", subject: "", message: "" });
          } else {
            throw new Error(data.message || "Form submission failed");
          }
        } catch (error) {
          console.error("Form submission error:", error);
          setFormStatus({
            submitting: false,
            success: false,
            error: true,
            message: `Sorry, there was an error. Please email directly at ${profile.email}`
          });
        }
      };

      if (loadError) {
        return (
          <div className="min-h-screen flex items-center justify-center px-4">
            <div className="card text-center max-w-md">
              <h2 className="text-xl font-bold text-cyan mb-2">Failed to Load Portfolio Data</h2>
              <p className="text-gray-400 text-sm mb-4">{loadError}</p>
              <p className="text-gray-500 text-xs">Make sure <code className="text-cyan">portfolio-data.json</code> is in the same directory as <code className="text-cyan">index.html</code>.</p>
              <button onClick={() => window.location.reload()} className="btn-primary mt-6 text-sm">Retry</button>
            </div>
          </div>
        );
      }

      if (!profile) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center gap-4">
            <div className="loading-spinner"></div>
            <p className="text-gray-400 text-sm">Loading portfolio data...</p>
          </div>
        );
      }

      const navItems = [
        { id: 'home', label: 'Home' },
        { id: 'about', label: 'About' },
        { id: 'publications', label: 'Publications' },
        { id: 'experience', label: 'Experience' },
        { id: 'education', label: 'Education' },
        { id: 'skills', label: 'Skills' },
        { id: 'contact', label: 'Contact' },
      ];

      return (
        <div className="min-h-screen" role="document">
          <a href="#main-content" className="absolute left-4 -top-16 z-[60] px-4 py-2 bg-cyan text-dark font-medium rounded-lg transition-all duration-200 focus:top-4 focus:outline-none focus:ring-2 focus:ring-cyan focus:ring-offset-2 focus:ring-offset-dark">
            Skip to main content
          </a>
          {/* Navigation */}
          <nav className={`sticky top-0 left-0 right-0 w-full z-50 transition-all duration-300 ${scrolled ? 'scrolled' : ''}`} role="navigation" aria-label="Main navigation">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4">
              <div className="flex justify-between items-center">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center">
                    <img src={profile.photo || "./assets/Photo.jpg"} alt={`${profile.name} - ${profile.title}`} className="w-full h-full object-cover rounded-full" />
                  </div>
                  <span className="text-xl font-bold text-cyan hidden sm:block">{getShortName(profile.name)}</span>
                </div>

                {/* Desktop Menu */}
                <div className="hidden md:flex items-center gap-8">
                  {navItems.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => scrollToSection(item.id)}
                      className={`text-sm font-medium transition-all ${activeSection === item.id
                        ? 'text-cyan'
                        : 'text-gray-400 hover:text-cyan'
                        }`}
                    >
                      {item.label}
                    </button>
                  ))}
                  <button
                    onClick={() => scrollToSection('contact')}
                    className="btn-primary text-sm"
                  >
                    Hire Me
                  </button>
                </div>

                {/* Mobile Menu Button */}
                <button
                  onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                  className="md:hidden text-cyan p-2"
                >
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    {mobileMenuOpen ? (
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                    ) : (
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                    )}
                  </svg>
                </button>
              </div>

              {/* Mobile Menu */}
              {mobileMenuOpen && (
                <div className="md:hidden mt-4 pb-4 space-y-1 border-t border-cyan/10 pt-4">
                  {navItems.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => scrollToSection(item.id)}
                      className="block w-full text-left px-4 py-2 text-gray-400 hover:text-cyan hover:bg-dark-card rounded-lg transition-all"
                    >
                      {item.label}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </nav>

          {/* Hero Section */}
          <main id="main-content" role="main">
            <section className="hero-section pt-16 sm:pt-20" aria-label="Introduction">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
                <div className="grid md:grid-cols-2 gap-8 md:gap-12 items-center">
                  <div className="fade-in">
                    <h1 className="hero-title">
                      <span className="block text-gray-300 text-base sm:text-lg font-medium mb-2">Hello, I’m</span>
                      <span className="block">{profile.name}</span>
                      <span className="block text-cyan text-lg sm:text-xl md:text-2xl font-semibold mt-3">{profile.title}</span>
                    </h1>
                    {/* GeoAI Slogans as subtitle */}
                    {Array.isArray(portfolioData?.hero?.slogans) && portfolioData.hero.slogans.length > 0 && (
                      <div className="space-y-3 mb-4">
                        {portfolioData.hero.slogans.map((text, i) => (
                          <blockquote key={i} className={`border-l-2 ${i === 0 ? 'border-cyan/50' : 'border-cyan/30'} pl-4`}>
                            <p className={`${i === 0 ? 'text-base sm:text-lg text-gray-300' : 'text-sm text-gray-400'} italic leading-relaxed`}>
                              “{text}”
                            </p>
                          </blockquote>
                        ))}
                      </div>
                    )}

                    <div className="flex flex-wrap gap-3 sm:gap-4 mt-6 sm:mt-8">
                      <button
                        onClick={() => scrollToSection('contact')}
                        className="btn-primary flex-1 sm:flex-initial min-w-[120px]"
                      >
                        Get in Touch
                      </button>
                      {profile?.phone && (
                        <a
                          href={getWhatsAppLink(profile.phone, `Hi ${profile.name}, I found your portfolio and would like to connect.`)}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="btn-secondary flex-1 sm:flex-initial min-w-[120px] inline-flex items-center justify-center gap-2"
                          aria-label={`Chat with ${profile.name} on WhatsApp`}
                        >
                          <svg className="w-5 h-5" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
                            <path d="M16 3C9.383 3 4 8.383 4 15c0 2.338.675 4.574 1.955 6.5L4 29l7.699-1.897A11.92 11.92 0 0 0 16 27c6.617 0 12-5.383 12-12S22.617 3 16 3zm0 21.818c-1.96 0-3.871-.537-5.528-1.552l-.397-.238-4.57 1.127 1.219-4.45-.259-.414A9.765 9.765 0 0 1 6.235 15c0-5.39 4.375-9.765 9.765-9.765S25.765 9.61 25.765 15 21.39 24.818 16 24.818zm5.68-7.294c-.309-.155-1.83-.902-2.114-1.004-.284-.103-.491-.155-.698.155-.207.309-.803 1.004-.985 1.211-.181.207-.362.232-.671.078-.309-.155-1.305-.481-2.485-1.535-.918-.819-1.538-1.83-1.718-2.14-.181-.309-.02-.476.135-.63.139-.138.309-.362.464-.542.155-.181.207-.31.309-.516.103-.207.052-.387-.026-.542-.077-.155-.698-1.684-.955-2.31-.25-.601-.504-.52-.698-.53l-.595-.01c-.207 0-.542.078-.826.387-.284.31-1.084 1.06-1.084 2.588 0 1.528 1.11 3.006 1.265 3.212.155.207 2.183 3.337 5.288 4.678.739.319 1.315.51 1.764.652.741.236 1.414.203 1.947.123.594-.089 1.83-.749 2.089-1.47.258-.723.258-1.341.181-1.47-.078-.13-.284-.207-.593-.362z" />
                          </svg>
                          <span>WhatsApp</span>
                        </a>
                      )}
                    </div>

                    {/* Stats Row */}
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 mt-8 sm:mt-12">
                      <div className="text-center">
                        <div className="stat-value">{portfolioData?.hero?.stats?.yearsExperience ?? 0}+</div>
                        <div className="text-sm text-gray-400 mt-1">Years Exp</div>
                      </div>
                      <div className="text-center">
                        <div className="stat-value">{publications.length}</div>
                        <div className="text-sm text-gray-400 mt-1">Publications</div>
                      </div>
                      <div className="text-center">
                        <div className="stat-value">{citationData.googleScholar.citations}</div>
                        <div className="text-sm text-gray-400 mt-1">Citations</div>
                      </div>
                      <div className="text-center">
                        <div className="stat-value">{citationData.googleScholar.hIndex}</div>
                        <div className="text-sm text-gray-400 mt-1">h-index</div>
                      </div>
                    </div>
                  </div>

                  <div className="flex justify-center fade-in">
                    <div className="flex flex-col items-center justify-center gap-6">
                      <img
                        src={profile.photo || "./assets/Photo.jpg"}
                        alt={`${profile.name} - ${profile.title}`}
                        className="profile-image object-cover"
                      />
                      {/* Social Links Around Image */}
                      <div className="flex items-center justify-center gap-2">
                        <a href={profile.links.linkedin} target="_blank" rel="noopener noreferrer" className="social-link">
                          <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                          </svg>
                        </a>
                        <a href={profile.links.scholar} target="_blank" rel="noopener noreferrer" className="social-link">
                          <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M5.242 13.769L0 9.5 12 0l12 9.5-5.242 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z" />
                          </svg>
                        </a>
                        <a href={profile.links.researchgate} target="_blank" rel="noopener noreferrer" className="social-link">
                          <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.894 8.221l-1.97-.345-.346-1.971a.3.3 0 0 0-.57 0l-.346 1.97-1.971.346a.3.3 0 0 0 0 .57l1.97.346.346 1.971a.3.3 0 0 0 .57 0l.346-1.97 1.971-.346a.3.3 0 0 0 0-.57z" />
                          </svg>
                        </a>
                        <a href={`mailto:${profile.email}`} className="social-link">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                          </svg>
                        </a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* About Section */}
            <section id="section-about" className="py-12 sm:py-16 md:py-24 px-4 sm:px-6 lg:px-8">
              <div className="max-w-7xl mx-auto">
                <h2 className="section-header text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-8 sm:mb-12">
                  About Me
                </h2>

                <div className="grid md:grid-cols-2 gap-6 sm:gap-8 mb-10 sm:mb-16">
                  <div className="card fade-in">
                    <h3 className="text-2xl font-bold text-cyan mb-4">{portfolioData?.about?.mission?.title || "Mission"}</h3>
                    <p className="text-gray-300 leading-relaxed">
                      {portfolioData?.about?.mission?.text || ""}
                    </p>
                  </div>

                  <div className="card fade-in">
                    <h3 className="text-2xl font-bold text-cyan mb-4">{portfolioData?.about?.vision?.title || "Vision"}</h3>
                    <p className="text-gray-300 leading-relaxed">
                      {portfolioData?.about?.vision?.text || ""}
                    </p>
                  </div>
                </div>

                <div className="card mb-10 sm:mb-16">
                  {Array.isArray(portfolioData?.about?.summary) && portfolioData.about.summary.length > 0 && (
                    <div className="space-y-4 sm:space-y-6">
                      {portfolioData.about.summary.map((t, i) => (
                        <p key={i} className="text-base sm:text-lg text-gray-300 leading-relaxed">
                          {t}
                        </p>
                      ))}
                    </div>
                  )}
                  {portfolioData?.about?.quote && (
                    <p className="text-base sm:text-lg text-cyan italic font-medium mt-6 sm:mt-8 pt-4 sm:pt-6 border-t border-cyan/20">
                      “{portfolioData.about.quote}”
                    </p>
                  )}
                </div>

                {/* Research Interests */}
                <h3 className="text-2xl sm:text-3xl font-bold text-white mb-6 sm:mb-8">Research Interests</h3>
                <div className="grid sm:grid-cols-2 md:grid-cols-3 gap-4 sm:gap-6">
                  {researchInterests.map((area, idx) => (
                    <div key={idx} className="card fade-in">
                      <h4 className="text-xl font-bold text-cyan mb-4">{area.title}</h4>
                      <ul className="space-y-2">
                        {area.topics.map((topic, i) => (
                          <li key={i} className="flex items-start gap-2 text-gray-300">
                            <span className="text-cyan mt-1">▹</span>
                            <span>{topic}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* Publications Section */}
            <section id="section-publications" className="py-12 sm:py-16 md:py-24 px-4 sm:px-6 lg:px-8 bg-dark-lighter/30">
              <div className="max-w-7xl mx-auto">
                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-6 mb-8 sm:mb-12">
                  <h2 className="section-header text-3xl sm:text-4xl md:text-5xl font-bold text-white">
                    Publications & Research
                  </h2>
                  <div className="flex gap-3 sm:gap-4 flex-shrink-0">
                    <div className="stat-card flex-1 sm:flex-initial min-w-0">
                      <div className="stat-value">{publications.length}</div>
                      <div className="text-xs sm:text-sm text-gray-400 mt-1">Papers</div>
                    </div>
                    <div className="stat-card flex-1 sm:flex-initial min-w-0">
                      <div className="stat-value">{citationData.googleScholar.citations}</div>
                      <div className="text-xs sm:text-sm text-gray-400 mt-1">Citations</div>
                    </div>
                  </div>
                </div>

                <div className="timeline">
                  {publications.map((pub, idx) => (
                    <div key={idx} className="timeline-item">
                      <div className="card">
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-2 sm:gap-4 mb-3">
                          <h3 className="text-lg sm:text-xl font-semibold text-white flex-1 min-w-0 break-words">{pub.title}</h3>
                          <span className="tag font-mono flex-shrink-0 self-start">{pub.year}</span>
                        </div>
                        <p className="text-cyan font-medium mb-3">{pub.journal}</p>
                        {pub.doi && (
                          <a
                            href={`https://doi.org/${pub.doi}`}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="text-sm text-gray-400 hover:text-cyan transition-colors break-all"
                          >
                            DOI: {pub.doi}
                          </a>
                        )}
                        {pub.doiLink && (
                          <a
                            href={pub.doiLink}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="text-sm text-gray-400 hover:text-cyan transition-colors"
                          >
                            View Publication →
                          </a>
                        )}
                        {pub.status && (
                          <div className="mt-3">
                            <span className="inline-block px-3 py-1 bg-yellow-500/10 text-yellow-500 rounded-md text-sm font-medium border border-yellow-500/20">
                              {pub.status}
                            </span>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Journal Positions */}
                <div className="mt-12 sm:mt-16">
                  <h3 className="text-2xl sm:text-3xl font-bold text-white mb-6 sm:mb-8">Journal Positions</h3>
                  <div className="grid sm:grid-cols-2 gap-4 sm:gap-6">
                    {journalPositions.map((pos, idx) => (
                      <div key={idx} className="card">
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-2 sm:gap-4">
                          <div className="min-w-0">
                            <h4 className="text-lg sm:text-xl font-semibold text-cyan mb-2">{pos.title}</h4>
                            {pos.link ? (
                              <a
                                href={pos.link}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="text-gray-300 hover:text-cyan transition-colors"
                              >
                                {pos.journal} →
                              </a>
                            ) : (
                              <p className="text-gray-300">{pos.journal}</p>
                            )}
                          </div>
                          <span className="text-xs sm:text-sm text-gray-400 whitespace-nowrap flex-shrink-0">{pos.period}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            {/* Experience Section */}
            <section id="section-experience" className="py-12 sm:py-16 md:py-24 px-4 sm:px-6 lg:px-8">
              <div className="max-w-7xl mx-auto">
                <h2 className="section-header text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-8 sm:mb-12">
                  Professional Experience
                </h2>

                <div className="timeline">
                  {experience.map((exp, idx) => (
                    <div key={idx} className="timeline-item">
                      <div className="card">
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-2 sm:gap-4 mb-4">
                          <div className="min-w-0">
                            <h3 className="text-xl sm:text-2xl font-bold text-white mb-2 break-words">{exp.role}</h3>
                            <p className="text-cyan font-medium text-sm sm:text-base break-words">{exp.org}</p>
                          </div>
                          <span className="tag font-mono whitespace-nowrap flex-shrink-0 self-start">{exp.period}</span>
                        </div>
                        {exp.project && (
                          <div className="mb-4 p-3 sm:p-4 bg-cyan/10 border-l-4 border-cyan rounded-r overflow-hidden">
                            <p className="text-sm text-gray-300 break-words">
                              <span className="font-semibold text-cyan">Project:</span> {exp.project}
                            </p>
                          </div>
                        )}
                        <ul className="space-y-3">
                          {exp.details.map((detail, i) => (
                            <li key={i} className="flex items-start gap-3">
                              <span className="text-cyan mt-1">▹</span>
                              <span className="text-gray-300">{detail}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* Education Section */}
            <section id="section-education" className="py-12 sm:py-16 md:py-24 px-4 sm:px-6 lg:px-8 bg-dark-lighter/30">
              <div className="max-w-7xl mx-auto">
                <h2 className="section-header text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-8 sm:mb-12">
                  Education & Certifications
                </h2>

                <div className="mb-10 sm:mb-16">
                  <h3 className="text-2xl sm:text-3xl font-bold text-white mb-6 sm:mb-8">Academic Background</h3>
                  <div className="timeline">
                    {education.map((edu, idx) => (
                      <div key={idx} className="timeline-item">
                        <div className="card">
                          <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-2 sm:gap-4 mb-4">
                            <div className="min-w-0">
                              <h4 className="text-xl sm:text-2xl font-bold text-white mb-2 break-words">{edu.degree}</h4>
                              <p className="text-cyan font-medium text-sm sm:text-base break-words">{edu.institution}</p>
                            </div>
                            <span className="tag font-mono whitespace-nowrap flex-shrink-0 self-start">{edu.period}</span>
                          </div>
                          <div className="mb-3">
                            <span className="inline-block px-3 py-1 bg-cyan/10 text-cyan rounded-md text-sm font-medium border border-cyan/20">
                              Grade: {edu.grade}
                            </span>
                          </div>
                          {edu.expertise && (
                            <p className="text-sm text-cyan mb-3">
                              <span className="font-semibold">Expertise:</span> {edu.expertise}
                            </p>
                          )}
                          <p className="text-gray-300 leading-relaxed">{edu.description}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div>
                  <h3 className="text-2xl sm:text-3xl font-bold text-white mb-6 sm:mb-8">Certifications</h3>
                  <div className="grid sm:grid-cols-2 gap-4 sm:gap-6">
                    {certifications.map((cert, idx) => (
                      <div key={idx} className="card">
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-1 sm:gap-4 mb-3">
                          <h4 className="text-base sm:text-lg font-semibold text-white break-words">{cert.title}</h4>
                          <span className="text-xs sm:text-sm text-gray-400 whitespace-nowrap flex-shrink-0">{cert.date}</span>
                        </div>
                        <p className="text-cyan font-medium mb-3 text-sm sm:text-base">{cert.institution}</p>
                        <p className="text-sm text-gray-300">{cert.description}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            {/* Skills Section */}
            <section id="section-skills" className="py-12 sm:py-16 md:py-24 px-4 sm:px-6 lg:px-8">
              <div className="max-w-7xl mx-auto">
                <h2 className="section-header text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-8 sm:mb-12">
                  Technical Expertise
                </h2>

                <div className="grid sm:grid-cols-2 gap-4 sm:gap-6">
                  {skills.map((skillSet, idx) => (
                    <div key={idx} className="card">
                      <h3 className="text-xl sm:text-2xl font-bold text-cyan mb-4 sm:mb-6">{skillSet.category}</h3>
                      <ul className="space-y-4">
                        {skillSet.tools.map((tool, i) => (
                          <li key={i} className="flex items-start gap-3">
                            <span className="text-cyan mt-1">▹</span>
                            <span className="text-gray-300">{tool}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* Contact Section */}
            <section id="section-contact" className="py-12 sm:py-16 md:py-24 px-4 sm:px-6 lg:px-8 bg-dark-lighter/30">
              <div className="max-w-4xl mx-auto">
                <div className="text-center mb-8 sm:mb-12">
                  <h2 className="section-header text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-3 sm:mb-4">
                    Let's Work Together
                  </h2>
                  <p className="text-base sm:text-xl text-gray-400 px-2">
                    Have a project in mind? Let's discuss how GeoAI can solve your challenges.
                  </p>
                </div>

                <div className="card mb-8 sm:mb-12">
                  <h3 className="text-xl sm:text-2xl font-bold text-cyan mb-4 sm:mb-6">Contact & Connect</h3>
                  <div className="grid md:grid-cols-2 gap-6 sm:gap-8 items-start">
                   
                      <div>
                        <p className="text-sm text-gray-400 mb-1">Email</p>
                        <a href={`mailto:${profile.email}`} className="text-gray-300 hover:text-cyan transition-colors break-words">
                          {profile.email}
                        </a>
                      </div>
                      <div>
                        <p className="text-sm text-gray-400 mb-1">Phone</p>
                        <a href={`tel:${profile.phone}`} className="text-gray-300 hover:text-cyan transition-colors break-words">
                          {profile.phone}
                        </a>
                      </div>
                      <div>
                        <p className="text-sm text-gray-400 mb-1">WhatsApp</p>
                        <a
                          href={getWhatsAppLink(profile.phone, `Hi ${profile.name}, I found your portfolio and would like to connect.`)}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="inline-flex items-center gap-2 text-gray-300 hover:text-cyan transition-colors break-words"
                          aria-label={`Chat with ${profile.name} on WhatsApp`}
                        >
                          <span className="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-[#25D366]/10 border border-[#25D366]/30 text-[#25D366] flex-shrink-0">
                            <svg className="w-5 h-5" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
                              <path d="M16 3C9.383 3 4 8.383 4 15c0 2.338.675 4.574 1.955 6.5L4 29l7.699-1.897A11.92 11.92 0 0 0 16 27c6.617 0 12-5.383 12-12S22.617 3 16 3zm0 21.818c-1.96 0-3.871-.537-5.528-1.552l-.397-.238-4.57 1.127 1.219-4.45-.259-.414A9.765 9.765 0 0 1 6.235 15c0-5.39 4.375-9.765 9.765-9.765S25.765 9.61 25.765 15 21.39 24.818 16 24.818zm5.68-7.294c-.309-.155-1.83-.902-2.114-1.004-.284-.103-.491-.155-.698.155-.207.309-.803 1.004-.985 1.211-.181.207-.362.232-.671.078-.309-.155-1.305-.481-2.485-1.535-.918-.819-1.538-1.83-1.718-2.14-.181-.309-.02-.476.135-.63.139-.138.309-.362.464-.542.155-.181.207-.31.309-.516.103-.207.052-.387-.026-.542-.077-.155-.698-1.684-.955-2.31-.25-.601-.504-.52-.698-.53l-.595-.01c-.207 0-.542.078-.826.387-.284.31-1.084 1.06-1.084 2.588 0 1.528 1.11 3.006 1.265 3.212.155.207 2.183 3.337 5.288 4.678.739.319 1.315.51 1.764.652.741.236 1.414.203 1.947.123.594-.089 1.83-.749 2.089-1.47.258-.723.258-1.341.181-1.47-.078-.13-.284-.207-.593-.362z" />
                            </svg>
                          </span>
                          <span>Message on WhatsApp</span>
                        </a>
                      </div>
                      <div>
                        <p className="text-sm text-gray-400 mb-1">Location</p>
                        <p className="text-gray-300">Jaipur, Rajasthan, India</p>
                      </div>
                   

                  </div>
                </div>

                {/* Contact Form */}
                <div className="card">
                  <h3 className="text-2xl font-bold text-cyan mb-6">Send a Message</h3>
                  <form onSubmit={handleFormSubmit} className="space-y-4 sm:space-y-6">
                    <div className="grid md:grid-cols-2 gap-4 sm:gap-6">
                      <div>
                        <label htmlFor="name" className="block text-sm font-medium text-gray-400 mb-2">
                          Name *
                        </label>
                        <input
                          type="text"
                          id="name"
                          name="name"
                          value={formData.name}
                          onChange={handleFormChange}
                          required
                          placeholder="Your Name"
                        />
                      </div>
                      <div>
                        <label htmlFor="email" className="block text-sm font-medium text-gray-400 mb-2">
                          Email *
                        </label>
                        <input
                          type="email"
                          id="email"
                          name="email"
                          value={formData.email}
                          onChange={handleFormChange}
                          required
                          placeholder="your.email@example.com"
                        />
                      </div>
                    </div>
                    <div>
                      <label htmlFor="subject" className="block text-sm font-medium text-gray-400 mb-2">
                        Subject *
                      </label>
                      <input
                        type="text"
                        id="subject"
                        name="subject"
                        value={formData.subject}
                        onChange={handleFormChange}
                        required
                        placeholder="Message Subject"
                      />
                    </div>
                    <div>
                      <label htmlFor="message" className="block text-sm font-medium text-gray-400 mb-2">
                        Message *
                      </label>
                      <textarea
                        id="message"
                        name="message"
                        value={formData.message}
                        onChange={handleFormChange}
                        required
                        rows="6"
                        placeholder="Your message here..."
                      />
                    </div>

                    {formStatus.message && (
                      <div className={`p-4 rounded-lg border ${formStatus.success
                        ? 'bg-green-500/10 border-green-500/30 text-green-400'
                        : formStatus.error
                          ? 'bg-red-500/10 border-red-500/30 text-red-400'
                          : 'bg-cyan/10 border-cyan/30 text-cyan'
                        }`}>
                        {formStatus.message}
                      </div>
                    )}

                    <button
                      type="submit"
                      disabled={formStatus.submitting}
                      className="btn-primary w-full flex items-center justify-center gap-2"
                    >
                      {formStatus.submitting ? (
                        <>
                          <div className="loading-spinner"></div>
                          Sending...
                        </>
                      ) : (
                        <>
                          Send Message
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                          </svg>
                        </>
                      )}
                    </button>
                  </form>
                </div>
              </div>
            </section>
          </main>

          {/* Footer */}
          <footer className="py-8 sm:py-12 px-4 sm:px-6 border-t border-cyan/10" role="contentinfo">
            <div className="max-w-7xl mx-auto">
              <div className="flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
                <div>
                  <p className="text-sm sm:text-base text-gray-400">
                    © {new Date().getFullYear()} {profile.name}. All rights reserved.
                  </p>
                  <p className="text-xs sm:text-sm text-gray-500 mt-1">
                    {profile.title}
                  </p>
                </div>
                <div className="flex flex-wrap justify-center gap-3 sm:gap-4">
                  <a href={profile.links.linkedin} target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-cyan transition-colors">
                    LinkedIn
                  </a>
                  <a href={profile.links.scholar} target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-cyan transition-colors">
                    Scholar
                  </a>
                  <a href={profile.links.researchgate} target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-cyan transition-colors">
                    ResearchGate
                  </a>
                  <a href={profile.links.orcid} target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-cyan transition-colors">
                    ORCID
                  </a>
                </div>
              </div>
            </div>
          </footer>

          {/* Floating WhatsApp button */}
          {profile?.phone && (
            <a
              className="whatsapp-fab"
              href={getWhatsAppLink(profile.phone, `Hi ${profile.name}, I found your portfolio and would like to connect.`)}
              target="_blank"
              rel="noopener noreferrer"
              aria-label={`Chat with ${profile.name} on WhatsApp`}
              title="Chat on WhatsApp"
            >
              <svg className="w-7 h-7" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
                <path d="M16 3C9.383 3 4 8.383 4 15c0 2.338.675 4.574 1.955 6.5L4 29l7.699-1.897A11.92 11.92 0 0 0 16 27c6.617 0 12-5.383 12-12S22.617 3 16 3zm0 21.818c-1.96 0-3.871-.537-5.528-1.552l-.397-.238-4.57 1.127 1.219-4.45-.259-.414A9.765 9.765 0 0 1 6.235 15c0-5.39 4.375-9.765 9.765-9.765S25.765 9.61 25.765 15 21.39 24.818 16 24.818zm5.68-7.294c-.309-.155-1.83-.902-2.114-1.004-.284-.103-.491-.155-.698.155-.207.309-.803 1.004-.985 1.211-.181.207-.362.232-.671.078-.309-.155-1.305-.481-2.485-1.535-.918-.819-1.538-1.83-1.718-2.14-.181-.309-.02-.476.135-.63.139-.138.309-.362.464-.542.155-.181.207-.31.309-.516.103-.207.052-.387-.026-.542-.077-.155-.698-1.684-.955-2.31-.25-.601-.504-.52-.698-.53l-.595-.01c-.207 0-.542.078-.826.387-.284.31-1.084 1.06-1.084 2.588 0 1.528 1.11 3.006 1.265 3.212.155.207 2.183 3.337 5.288 4.678.739.319 1.315.51 1.764.652.741.236 1.414.203 1.947.123.594-.089 1.83-.749 2.089-1.47.258-.723.258-1.341.181-1.47-.078-.13-.284-.207-.593-.362z" />
              </svg>
            </a>
          )}
        </div>
      );
    }

    ReactDOM.render(<Portfolio />, document.getElementById("root"));
  </script>
</body>

</html>
